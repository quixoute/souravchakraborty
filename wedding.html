<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourav Chakraborty - Weddings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        /* Hide scrollbars since Three JS handles it */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
        }



        /* Container for CSS3D elements (the floating videos) */
        #css-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* Let the container itself ignore clicks... */
        }

        .video-card {
            width: 480px;
            height: 270px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.8);
            border-radius: 8px; /* Slight rounding looks nice */
            background: #000;
            pointer-events: auto; /* ...but let the cards accept clicks */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            will-change: transform; /* Hardware acceleration hint for smoother scrolling */
        }

        .video-card:hover {
            transform: scale(1.05); /* Slight zoom on hover, similar to project images */
            box-shadow: 0px 0px 30px rgba(255,255,255,0.4);
            z-index: 10;
        }

        .video-card iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
            pointer-events: auto; /* Ensure iframes accept clicks */
            transition: opacity 0.3s;
        }

        /* Shield to capture scroll events and prevent iframe from stealing wheel events */
        .shield {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }

        .video-card:hover .shield {
            opacity: 1;
        }
        
        /* Performance Fix: Disable pointer events heavily during scroll */
        body.is-scrolling iframe {
            pointer-events: none !important;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #181818;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 40px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: rgba(255, 255, 255, 1);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .back-btn:hover svg {
            transform: translateX(-4px);
        }

        /* Scroll indicator styles */
        #scroll-indicator {
            position: absolute;
            bottom: 20px; /* Pushed down from 40px */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #000;
            font-family: 'Inter', 'Roboto', sans-serif;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .scroll-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.7);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .mouse {
            width: 24px;
            height: 38px;
            border: 2px solid rgba(0, 0, 0, 0.8);
            border-radius: 14px;
            margin: 0 auto;
            position: relative;
            background: rgba(255, 255, 255, 0.5);
        }

        .wheel {
            width: 2px;
            height: 6px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 2px;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            animation: scrollDown 1.5s infinite;
        }

        @keyframes scrollDown {
            0% {
                top: 6px;
                opacity: 0;
            }
            20% {
                top: 6px;
                opacity: 1;
            }
            80% {
                top: 20px;
                opacity: 1;
            }
            100% {
                top: 20px;
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Go Back Button -->
    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
    </a>

    <div id="scroll-indicator">
        <div class="scroll-text">Scroll down to explore</div>
        <div class="mouse">
            <div class="wheel"></div>
        </div>
    </div>


    <div id="css-container"></div>

    <!-- Scripts -->
    <!-- Note: Load Three.js r128 to match index.html -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="CSS3DRenderer.js"></script>

    <script>
        // Dismiss loading overlay after a short delay
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
        });

        const videoIds = [
            "j6KxpiUJJ1Y", // Sukanya and Sayak's
            "Zy1IGA-aFNI", // Sayantani and Debarshi's
            "lZ8vpZghhG8", // Shivani and Pawan's
            "VjV4iJC-rBc", // Rhea and Craig's
            "lFbrmG26eos"  // Upasana and Akash's
        ];

        let camera, scene, cssRenderer, videoGroup;
        const mouse = new THREE.Vector2();
        
        // Scroll variables
        let targetZ = 1600; // Starting camera z position
        const scrollSpeed = 1.8; // Slightly reduced for smoother feel
        
        // Depth logic: The last video is at z = -(5 - 1) * 600 = -2400. 
        // Keep the camera at least 600 units away from the last video to avoid it looking too massive.
        const minZ = -1800; 
        const maxZ = 1600;

        let scrollTimeout;

        init();
        animate();

        function init() {
            const containerCSS = document.getElementById('css-container');

            // --- CAMERA ---
            // Field of view, aspect ratio, near, far plane
            camera = new THREE.PerspectiveCamera( 50, window.innerWidth / window.innerHeight, 1, 5000 );
            camera.position.z = maxZ;
            
            // --- SCENE ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            // --- RENDERERS ---
            // CSS3DRenderer for DOM elements
            cssRenderer = new THREE.CSS3DRenderer();
            cssRenderer.setSize( window.innerWidth, window.innerHeight );
            containerCSS.appendChild( cssRenderer.domElement );

            // --- CREATE VIDEO OBJECTS ---
            videoGroup = new THREE.Group();
            
            // Apparent 2D grid layout from camera starting at z=1600
            // The canvas width/height is dynamic, but these offset units work perfectly
            const apparentPositions = [
                { x: -300, y:  220 }, // Top Left
                { x:  300, y:  220 }, // Top Right
                { x: -300, y: -100 }, // Bottom Left
                { x:  300, y: -100 }, // Bottom Right
                { x:    0, y:   60 }  // Center
            ];

            videoIds.forEach((id, index) => {
                const element = document.createElement( 'div' );
                element.className = 'video-card';
                
                const iframe = document.createElement( 'iframe' );
                iframe.src = `https://www.youtube.com/embed/${id}?rel=0`;
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
                iframe.allowFullscreen = true;
                
                element.appendChild( iframe );

                // Add Shield Overlay to capture scroll events and require interaction
                const shield = document.createElement('div');
                shield.className = 'shield';
                shield.innerHTML = '<span>Click to Interact</span>';
                element.appendChild(shield);

                shield.addEventListener('click', () => {
                    shield.style.pointerEvents = 'none';
                    shield.style.opacity = '0';
                });

                element.addEventListener('mouseleave', () => {
                    shield.style.pointerEvents = 'auto';
                    shield.style.opacity = '';
                });

                // Create the CSS3DObject binding the element
                const object = new THREE.CSS3DObject( element );
                
                // Position logic: stagger deeply in Z, but create a perfect apparent grid from starting Z
                const pos = apparentPositions[index % apparentPositions.length];
                const zOffset = - (index * 600);
                
                // Calculate scale needed so that when viewed from maxZ, it aligns with pos.x / pos.y
                const distFromStart = maxZ - zOffset; 
                const scale = distFromStart / 1000; 

                const xOffset = pos.x * scale;
                const yOffset = pos.y * scale;

                object.position.x = xOffset;
                object.position.y = yOffset;
                object.position.z = zOffset;
                
                // Keep the videos flat, no rotation
                object.rotation.y = 0;
                
                // Save base values for animation lerping natively on the object's userData
                object.userData = {
                    baseX: xOffset,
                    baseY: yOffset,
                    baseZ: zOffset
                };
                
                videoGroup.add( object );
            });
            
            scene.add( videoGroup );

            // --- EVENT LISTENERS ---
            window.addEventListener( 'resize', onWindowResize );
            window.addEventListener( 'wheel', onMouseWheel, { passive: false } );
            
            // Touch scroll handling for mobile
            let touchStartY = 0;
            window.addEventListener('touchstart', e => {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            window.addEventListener('touchmove', e => {
                const touchY = e.touches[0].clientY;
                const deltaY = touchStartY - touchY;
                
                // Notice we subtract to match the "scroll down to explore" logic
                targetZ -= deltaY * 0.5; 
                targetZ = Math.max(minZ, Math.min(maxZ, targetZ));
                touchStartY = touchY;

                updateIndicator();
                handleScrollState();
            }, { passive: true });

            // Right click navigation to head back
            window.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                targetZ = maxZ; // zoom all the way back out
                updateIndicator();
            });
        }

        function onMouseWheel( event ) {
            // Subtracting deltaY means scrolling DOWN (positive deltaY) moves camera forward (smaller z)
            targetZ -= event.deltaY * scrollSpeed;
            targetZ = Math.max(minZ, Math.min(maxZ, targetZ));
            updateIndicator();
            handleScrollState();
        }

        function handleScrollState() {
            // Set body class to disable iframe pointer events while scrolling
            document.body.classList.add('is-scrolling');
            
            // Clear the timeout if it exists
            if (scrollTimeout) clearTimeout(scrollTimeout);
            
            // Re-enable pointer events after scrolling stops (150ms delay)
            scrollTimeout = setTimeout(() => {
                document.body.classList.remove('is-scrolling');
            }, 150);
        }

        function updateIndicator() {
            const indicator = document.getElementById('scroll-indicator');
            if (indicator) {
                // Fade out indicator when user starts scrolling inwards
                if (targetZ < maxZ - 50) {
                    indicator.style.opacity = '0';
                } else {
                    indicator.style.opacity = '1';
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            cssRenderer.setSize( window.innerWidth, window.innerHeight );
        }

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame( animate );

            // Smoothly interpolate camera position towards targetZ
            camera.position.z += (targetZ - camera.position.z) * 0.05;

            let parallaxX = 0;
            let parallaxY = 0;
            if (mouse.x !== undefined) {
                // Determine a gentle parallax offset for the CSS elements
                parallaxX = mouse.x * 50;  
                parallaxY = mouse.y * 50;
                
                // Slowly move camera based on mouse
                camera.position.x += (mouse.x * 20 - camera.position.x) * 0.05;
                camera.position.y += (mouse.y * 20 - camera.position.y) * 0.05;
            }

            // Animate items moving to center based on distance to camera
            if (videoGroup) {
                videoGroup.children.forEach(plane => {
                    // Distance calculated from camera's position pointing forward into negative Z
                    const dist = camera.position.z - plane.userData.baseZ;
                    
                    let factor = 0;
                    
                    // Adjust distances to snap to 0 factor exactly at dist=1600
                    if (dist >= 1600) {
                        // At or further than starting distance: perfectly at base layout
                        factor = 0;
                    } else if (dist < 1600 && dist > 800) {
                        // Scrolling in: glide into the center
                        factor = 1.0 - ((dist - 800) / 800); 
                    } else if (dist <= 800 && dist >= 400) {
                        // Perfect center focus phase
                        factor = 1.0; 
                    } else if (dist < 400 && dist > -200) {
                        // Pushed aside gracefully when the camera flies past
                        factor = (dist + 200) / 600; 
                    } else {
                        // Out of view / passed fully
                        factor = 0; 
                    }
                    
                    // Ease-in-out curve
                    const smoothFactor = factor * factor * (3 - 2 * factor); 
                    
                    // Interpolate from base towards center (0), THEN add parallax always
                    plane.position.x = THREE.MathUtils.lerp(plane.userData.baseX, 0, smoothFactor) + parallaxX;
                    plane.position.y = THREE.MathUtils.lerp(plane.userData.baseY, 0, smoothFactor) + parallaxY;
                });
            }

            // Render CSS3D scene
            cssRenderer.render( scene, camera );
        }
    </script>
</body>
</html>
