<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tri — Sourav Chakraborty</title>
    <meta name="description" content="Tri photo gallery by Sourav Chakraborty">
    <link rel="stylesheet" href="film.css">
    <style>
        body { overflow-y: auto; overflow-x: hidden; }

        /* ─── Gallery Header ─── */
        .gallery-header {
            text-align: center;
            padding: 120px 20px 40px;
            opacity: 0;
            animation: fadeInUp 0.8s 0.3s var(--transition-smooth) forwards;
        }
        .gallery-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--film-text);
            margin-bottom: 12px;
        }
        .gallery-header p {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--film-text-dim);
        }
        .gallery-header .divider {
            width: 40px;
            height: 1px;
            background: var(--film-accent);
            margin: 20px auto 0;
        }

        /* ─── Masonry Grid ─── */
        .gallery-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            columns: 3;
            column-gap: 16px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s var(--transition-smooth),
                        transform 0.6s var(--transition-smooth);
        }

        .gallery-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.6s var(--transition-smooth),
                        filter 0.6s var(--transition-smooth);
            filter: saturate(0.85) contrast(1.05);
        }

        .gallery-item:hover img {
            transform: scale(1.03);
            filter: saturate(1) contrast(1.1);
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.15) 0%, transparent 40%);
            opacity: 0;
            transition: opacity 0.4s var(--transition-smooth);
            pointer-events: none;
        }
        .gallery-item:hover::after { opacity: 1; }

        /* ─── Lightbox ─── */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10001;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s var(--transition-smooth), visibility 0.4s;
            cursor: zoom-out;
        }
        .lightbox.open { opacity: 1; visibility: visible; }

        .lightbox img {
            max-width: 92vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 2px;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.4s var(--transition-smooth);
        }
        .lightbox.open img { transform: scale(1); }

        .lightbox-close {
            position: absolute;
            top: 20px; right: 24px;
            color: var(--film-text-dim);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s;
            background: none; border: none;
            font-family: 'Inter', sans-serif;
        }
        .lightbox-close:hover { color: var(--film-text); }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--film-text-dim);
            font-size: 36px;
            cursor: pointer;
            background: none; border: none;
            padding: 20px;
            transition: color 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .lightbox-nav:hover { color: var(--film-accent); }
        .lightbox-prev { left: 10px; }
        .lightbox-next { right: 10px; }

        /* ─── Footer spacer ─── */
        .gallery-footer {
            text-align: center;
            padding: 60px 20px 80px;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--film-text-dim);
            text-transform: uppercase;
        }

        /* ─── Responsive ─── */
        @media (max-width: 900px) {
            .gallery-grid { columns: 2; column-gap: 12px; padding: 16px; }
            .gallery-item { margin-bottom: 12px; }
        }
        @media (max-width: 540px) {
            .gallery-grid { columns: 1; column-gap: 0; padding: 12px; }
            .gallery-item { margin-bottom: 12px; border-radius: 2px; }
            .gallery-header { padding: 100px 16px 30px; }
            .lightbox-nav { font-size: 24px; padding: 12px; }
        }
    </style>
</head>
<body class="film-grain film-vignette">

    <div class="film-loader" id="loader"><div class="film-loader__ring"></div><div class="film-loader__text">Loading</div></div>

    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
        </svg>Back
    </a>

    <div class="gallery-header">
        <h1>Tri</h1>
        <p>A Visual Story</p>
        <div class="divider"></div>
    </div>

    <div class="gallery-grid" id="gallery"></div>

    <div class="gallery-footer">End of Gallery</div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lbClose">×</button>
        <button class="lightbox-nav lightbox-prev" id="lbPrev">‹</button>
        <img id="lbImg" src="" alt="Gallery image">
        <button class="lightbox-nav lightbox-next" id="lbNext">›</button>
    </div>

    <script>
        const imageCount = 14;
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lbImg');
        let currentLb = 0;
        const images = [];

        // Build gallery
        for (let i = 1; i <= imageCount; i++) {
            const src = `Tri/${i}.webp`;
            images.push(src);

            const item = document.createElement('div');
            item.className = 'gallery-item';

            const img = document.createElement('img');
            img.src = src;
            img.alt = `Tri photograph ${i}`;
            img.loading = 'lazy';
            img.decoding = 'async';

            item.appendChild(img);
            item.addEventListener('click', () => openLightbox(i - 1));
            gallery.appendChild(item);
        }

        // Intersection Observer for reveal
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px 60px 0px' });

        document.querySelectorAll('.gallery-item').forEach((item, i) => {
            item.style.transitionDelay = `${(i % 6) * 0.08}s`;
            revealObserver.observe(item);
        });

        // Lightbox
        function openLightbox(idx) {
            currentLb = idx;
            lbImg.src = images[idx];
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('lbClose').addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

        document.getElementById('lbPrev').addEventListener('click', (e) => {
            e.stopPropagation();
            currentLb = (currentLb - 1 + images.length) % images.length;
            lbImg.src = images[currentLb];
        });

        document.getElementById('lbNext').addEventListener('click', (e) => {
            e.stopPropagation();
            currentLb = (currentLb + 1) % images.length;
            lbImg.src = images[currentLb];
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') { currentLb = (currentLb - 1 + images.length) % images.length; lbImg.src = images[currentLb]; }
            if (e.key === 'ArrowRight') { currentLb = (currentLb + 1) % images.length; lbImg.src = images[currentLb]; }
        });

        // Loader
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
        });
    </script>
</body>
</html>
