<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacify — Sourav Chakraborty</title>
    <meta name="description" content="Spacify brand films by Sourav Chakraborty">
    <link rel="stylesheet" href="film.css">
    <style>
        body { overflow: hidden; }
        .video-scroller {
            width: 100vw; height: 100vh;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .video-scroller::-webkit-scrollbar { display: none; }

        .video-section {
            width: 100%; height: 100vh; scroll-snap-align: start;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        .video-section::after {
            content: ''; position: absolute; bottom: 0; left: 10%; width: 80%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--film-border), transparent);
        }
        .video-section:last-child::after { display: none; }

        .video-wrapper {
            position: relative; width: 44%; max-width: 400px;
            aspect-ratio: 9 / 16; border-radius: 8px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(196,162,101,0.08);
            opacity: 0; transform: scale(0.96);
            transition: opacity 0.8s var(--transition-smooth), transform 0.8s var(--transition-smooth);
        }
        .video-section.active .video-wrapper { opacity: 1; transform: scale(1); }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }

        .video-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 40px 20px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            opacity: 0; transition: opacity 0.5s var(--transition-smooth); pointer-events: none;
        }
        .video-section.active .video-info { opacity: 1; }
        .video-info__title { font-family: 'Cormorant Garamond', serif; font-size: clamp(16px, 3vw, 24px); font-weight: 300; letter-spacing: 2px; color: var(--film-text); }
        .video-info__number { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--film-accent); margin-bottom: 6px; }

        .video-counter { position: fixed; bottom: 28px; right: 28px; z-index: 9999; font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--film-text-dim); letter-spacing: 2px; opacity: 0; animation: fadeIn 0.6s 1.2s var(--transition-smooth) forwards; }
        .video-counter__current { color: var(--film-accent); font-size: 22px; }

        @media (max-width: 768px) { .video-wrapper { width: 70%; max-width: 340px; } .video-counter { bottom: 20px; right: 16px; } }
        @media (max-width: 480px) { .video-wrapper { width: 85%; border-radius: 4px; } }
    </style>
</head>
<body class="film-grain film-vignette">
    <div class="film-loader" id="loader"><div class="film-loader__ring"></div><div class="film-loader__text">Loading</div></div>
    <a href="r.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>Back</a>
    <div class="page-title">Spacify</div>
    <div class="scroll-hint" id="scrollHint"><span class="scroll-hint__text">Scroll</span><div class="scroll-hint__mouse"><div class="scroll-hint__wheel"></div></div></div>
    <div class="video-progress" id="progressDots"></div>
    <div class="video-counter"><span class="video-counter__current" id="currentIdx">01</span><span> / </span><span id="totalIdx">02</span></div>
    <div class="video-scroller" id="scroller"></div>

    <script>
        const videos = [
            { id: "3Xkhmkpkgxg", title: "Spacify — Reel 1" },
            { id: "OM6LmPrAXyQ", title: "Spacify — Reel 2" }
        ];
        const scroller = document.getElementById('scroller');
        const progressDots = document.getElementById('progressDots');
        const scrollHint = document.getElementById('scrollHint');
        const currentIdxEl = document.getElementById('currentIdx');
        document.getElementById('totalIdx').textContent = String(videos.length).padStart(2, '0');

        videos.forEach((video, i) => {
            const section = document.createElement('div'); section.className = 'video-section'; section.dataset.index = i;
            section.innerHTML = `<div class="video-wrapper"><div id="player-${i}"></div><div class="video-info"><div class="video-info__number">Reel ${String(i+1).padStart(2,'0')}</div><div class="video-info__title">${video.title}</div></div></div>`;
            scroller.appendChild(section);
            const dot = document.createElement('div'); dot.className = 'video-progress__dot'; dot.dataset.index = i;
            dot.addEventListener('click', () => scroller.children[i].scrollIntoView({ behavior: 'smooth' }));
            progressDots.appendChild(dot);
        });

        let players = [], apiReady = false;
        const tag = document.createElement('script'); tag.src = 'https://www.youtube.com/iframe_api'; document.head.appendChild(tag);
        window.onYouTubeIframeAPIReady = function() {
            apiReady = true;
            videos.forEach((v, i) => { players[i] = new YT.Player(`player-${i}`, { videoId: v.id, playerVars: { rel: 0, modestbranding: 1, playsinline: 1, controls: 1 }, events: { onReady: () => { if (i === 0) setTimeout(() => document.getElementById('loader').classList.add('hidden'), 600); } } }); });
        };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const idx = parseInt(entry.target.dataset.index);
                if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
                    entry.target.classList.add('active'); currentIdxEl.textContent = String(idx+1).padStart(2,'0');
                    document.querySelectorAll('.video-progress__dot').forEach((d,di) => d.classList.toggle('active', di === idx));
                    if (idx > 0) scrollHint.style.opacity = '0';
                    if (apiReady) players.forEach((p, pi) => { try { pi === idx ? p.playVideo() : p.pauseVideo(); } catch(e){} });
                } else { entry.target.classList.remove('active'); }
            });
        }, { root: scroller, threshold: [0.6] });
        document.querySelectorAll('.video-section').forEach(s => observer.observe(s));
        setTimeout(() => { document.querySelector('.video-section')?.classList.add('active'); document.querySelector('.video-progress__dot')?.classList.add('active'); }, 100);
        window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('hidden'), 3000));
    </script>
<script src="mouse-skew.js"></script></body>
</html>
