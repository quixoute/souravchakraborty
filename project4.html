<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files — Sourav Chakraborty</title>
    <meta name="description" content="File browser by Sourav Chakraborty">
    <link rel="stylesheet" href="film.css">
    <style>
        body { overflow-y: auto; overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .terminal-window {
            width: 90%; max-width: 800px;
            background: var(--film-surface);
            border: 1px solid var(--film-border);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            opacity: 0;
            animation: fadeInScale 0.6s 0.3s var(--transition-smooth) forwards;
        }

        .terminal-titlebar {
            background: var(--film-bg-light);
            padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--film-border);
        }
        .terminal-titlebar span {
            font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
            color: var(--film-text-dim);
        }
        .terminal-dots { display: flex; gap: 6px; }
        .terminal-dot { width: 10px; height: 10px; border-radius: 50%; }
        .terminal-dot--close { background: #5c3a3a; }
        .terminal-dot--min { background: #5c5a3a; }
        .terminal-dot--max { background: #3a5c3a; }

        .terminal-body {
            display: flex; height: 450px;
        }

        .terminal-sidebar {
            width: 180px; padding: 12px;
            border-right: 1px solid var(--film-border);
            overflow-y: auto;
        }
        .folder-item {
            padding: 8px 10px; border-radius: 4px;
            cursor: pointer; font-size: 12px;
            color: var(--film-text-dim);
            display: flex; align-items: center; gap: 8px;
            transition: background 0.2s, color 0.2s;
        }
        .folder-item:hover, .folder-item.selected { background: rgba(196,162,101,0.08); color: var(--film-text); }
        .folder-item .icon { font-size: 14px; }

        .terminal-content {
            flex: 1; overflow-y: auto; padding: 0;
        }
        .file-header {
            position: sticky; top: 0;
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
            padding: 10px 16px; font-size: 10px; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--film-accent);
            background: var(--film-surface);
            border-bottom: 1px solid var(--film-border);
        }
        .file-row {
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
            padding: 10px 16px; font-size: 12px;
            color: var(--film-text-dim);
            border-bottom: 1px solid rgba(42,42,42,0.4);
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
        }
        .file-row:hover { background: rgba(196,162,101,0.06); color: var(--film-text); }

        .terminal-statusbar {
            padding: 8px 16px; font-size: 10px; letter-spacing: 1px;
            color: var(--film-text-dim); border-top: 1px solid var(--film-border);
            display: flex; justify-content: space-between;
        }

        @media (max-width: 640px) {
            .terminal-sidebar { display: none; }
            .terminal-window { width: 96%; }
            .file-header, .file-row { grid-template-columns: 2fr 1fr; }
            .file-header span:nth-child(3), .file-header span:nth-child(4),
            .file-row span:nth-child(3), .file-row span:nth-child(4) { display: none; }
        }
    </style>
</head>
<body class="film-grain film-vignette">
    <a href="index.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>Back</a>

    <div class="terminal-window">
        <div class="terminal-titlebar">
            <div class="terminal-dots">
                <div class="terminal-dot terminal-dot--close"></div>
                <div class="terminal-dot terminal-dot--min"></div>
                <div class="terminal-dot terminal-dot--max"></div>
            </div>
            <span>File Browser</span>
            <span style="width:48px"></span>
        </div>
        <div class="terminal-body">
            <div class="terminal-sidebar">
                <div class="folder-item selected" onclick="selectFolder(this,'Documents')"><span class="icon">📁</span> Documents</div>
                <div class="folder-item" onclick="selectFolder(this,'Downloads')"><span class="icon">📁</span> Downloads</div>
                <div class="folder-item" onclick="selectFolder(this,'Pictures')"><span class="icon">📁</span> Pictures</div>
                <div class="folder-item" onclick="selectFolder(this,'Music')"><span class="icon">📁</span> Music</div>
            </div>
            <div class="terminal-content">
                <div class="file-header"><span>Name</span><span>Size</span><span>Type</span><span>Modified</span></div>
                <div id="fileList"></div>
            </div>
        </div>
        <div class="terminal-statusbar"><span id="itemCount">1 items</span><span id="selectedFolder">Documents</span></div>
    </div>

    <script>
        function selectFolder(el, name) {
            document.querySelectorAll('.folder-item').forEach(f => f.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('selectedFolder').textContent = name;
            loadFiles(name);
        }
        function loadFiles(folder) {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            const files = [{ name: 'example.txt', size: '1.2 KB', type: 'Text', date: '2024-02-20' }];
            files.forEach(f => {
                const row = document.createElement('div');
                row.className = 'file-row';
                row.innerHTML = `<span>📄 ${f.name}</span><span>${f.size}</span><span>${f.type}</span><span>${f.date}</span>`;
                list.appendChild(row);
            });
            document.getElementById('itemCount').textContent = `${files.length} items`;
        }
        loadFiles('Documents');
    </script>
<script src="mouse-skew.js"></script></body>
</html>
