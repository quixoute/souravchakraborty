<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourav Chakraborty</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* Scroll indicator styles */
        #scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #000;
            /* Assuming white background */
            font-family: 'Inter', 'Roboto', sans-serif;
            pointer-events: none;
            /* So it doesn't block clicks */
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .scroll-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .mouse {
            width: 24px;
            height: 38px;
            border: 2px solid rgba(0, 0, 0, 0.8);
            border-radius: 14px;
            margin: 0 auto;
            position: relative;
        }

        .wheel {
            width: 2px;
            height: 6px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 2px;
            position: absolute;
            /* Animation for moving up */
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            animation: scrollUp 1.5s infinite;
        }

        @keyframes scrollUp {
            0% {
                top: 20px;
                opacity: 0;
            }

            20% {
                top: 20px;
                opacity: 1;
            }

            80% {
                top: 6px;
                opacity: 1;
            }

            100% {
                top: 6px;
                opacity: 0;
            }
        }

        .invite-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 15, 15, 0.55);
            z-index: 30;
            padding: 24px;
        }

        .invite-modal.is-open {
            display: flex;
        }

        .invite-panel {
            width: min(100%, 360px);
            background: #f7f3ec;
            border: 1px solid rgba(15, 15, 15, 0.12);
            border-radius: 20px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
            padding: 28px 24px 24px;
            font-family: 'Inter', 'Roboto', sans-serif;
            color: #111;
        }

        .invite-panel h2 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        .invite-panel p {
            margin: 0 0 16px;
            font-size: 14px;
            line-height: 1.5;
            color: rgba(17, 17, 17, 0.75);
        }

        .invite-input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(15, 15, 15, 0.14);
            border-radius: 12px;
            background: #fff;
            padding: 13px 14px;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .invite-error {
            min-height: 18px;
            margin-bottom: 14px;
            font-size: 13px;
            color: #b42318;
        }

        .invite-actions {
            display: flex;
            gap: 10px;
        }

        .invite-button {
            flex: 1;
            border: 0;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .invite-button.primary {
            background: #111;
            color: #fff;
        }

        .invite-button.secondary {
            background: rgba(17, 17, 17, 0.08);
            color: #111;
        }
    </style>
</head>

<body>
    <div id="scroll-indicator">
        <div class="scroll-text">Scroll up to continue</div>
        <div class="mouse">
            <div class="wheel"></div>
        </div>
    </div>

    <div id="invite-modal" class="invite-modal" aria-hidden="true">
        <div class="invite-panel" role="dialog" aria-modal="true" aria-labelledby="invite-title">
            <h2 id="invite-title">Invite Only</h2>
            <p>Enter the invite code to open this project.</p>
            <input id="invite-code-input" class="invite-input" type="password" placeholder="Invite code" autocomplete="off">
            <div id="invite-error" class="invite-error"></div>
            <div class="invite-actions">
                <button id="invite-cancel" class="invite-button secondary" type="button">Cancel</button>
                <button id="invite-submit" class="invite-button primary" type="button">Open Project</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const PROJECT5_INVITE_CODE = 'Thursday!April!FrameFind!Invitation';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // White background
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const inviteModal = document.getElementById('invite-modal');
        const invitePanel = inviteModal.querySelector('.invite-panel');
        const inviteCodeInput = document.getElementById('invite-code-input');
        const inviteError = document.getElementById('invite-error');
        const inviteSubmit = document.getElementById('invite-submit');
        const inviteCancel = document.getElementById('invite-cancel');
        let pendingInviteUrl = '';
        let ignoreSceneClicksUntil = 0;

        const pauseSceneClicks = () => {
            ignoreSceneClicksUntil = Date.now() + 300;
        };

        const closeInviteModal = () => {
            pauseSceneClicks();
            inviteModal.classList.remove('is-open');
            inviteModal.setAttribute('aria-hidden', 'true');
            inviteCodeInput.value = '';
            inviteError.textContent = '';
            pendingInviteUrl = '';
        };

        const openInviteModal = (url) => {
            pauseSceneClicks();
            pendingInviteUrl = url;
            inviteModal.classList.add('is-open');
            inviteModal.setAttribute('aria-hidden', 'false');
            inviteError.textContent = '';
            inviteCodeInput.value = '';
            requestAnimationFrame(() => inviteCodeInput.focus());
        };

        const submitInviteCode = () => {
            const enteredCode = inviteCodeInput.value.trim();

            if (enteredCode === PROJECT5_INVITE_CODE) {
                pauseSceneClicks();
                window.location.href = pendingInviteUrl;
                return;
            }

            inviteError.textContent = 'That invite code is not valid.';
            inviteCodeInput.select();
        };

        invitePanel.addEventListener('click', (event) => {
            event.stopPropagation();
        });
        inviteSubmit.addEventListener('click', (event) => {
            event.stopPropagation();
            submitInviteCode();
        });
        inviteCancel.addEventListener('click', (event) => {
            event.stopPropagation();
            closeInviteModal();
        });
        inviteModal.addEventListener('click', (event) => {
            if (event.target === inviteModal) {
                closeInviteModal();
            }
        });
        inviteCodeInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                submitInviteCode();
            }

            if (event.key === 'Escape') {
                closeInviteModal();
            }
        });

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(0, 1, 1);
        scene.add(directionalLight);

        // Texture loader with error handling
        const textureLoader = new THREE.TextureLoader();
        const loadTexture = (path) => {
            return new Promise((resolve, reject) => {
                textureLoader.load(
                    path,
                    (texture) => {
                        // Enable alpha channel for PNG textures
                        if (path.endsWith('.png')) {
                            texture.format = THREE.RGBAFormat;
                        }
                        resolve(texture);
                    },
                    undefined,
                    (error) => {
                        console.error(`Error loading texture ${path}:`, error);
                        reject(error);
                    }
                );
            });
        };

        // Create materials for images and containers
        const createMaterials = async () => {
            try {
                const materials = {
                    image1: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/31.jpg'),
                        transparent: false
                    }),
                    image2: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/IMG_6799.png'),
                        transparent: true,
                        alphaTest: 0.5
                    }),
                    image3: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/intro.png'),
                        transparent: true,
                        alphaTest: 0.5
                    }),
                    image4: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/1.4.png'),
                        transparent: true,
                        alphaTest: 0.5
                    })
                };

                const projectMaterials = {
                    project1: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/26.jpg'),
                        transparent: false
                    }),
                    project2: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/30.jpg'),
                        transparent: false
                    }),
                    project3: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/38.jpg'),
                        transparent: false
                    }),
                    project4: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/40.jpg'),
                        transparent: false
                    }),
                    project5: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/framefind-logo.svg'),
                        transparent: false
                    }),
                    project6: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/44.jpg'),
                        transparent: false
                    }),
                    project7: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/39.jpg'),
                        transparent: false
                    }),
                    project8: new THREE.MeshBasicMaterial({
                        map: await loadTexture('/28.jpg'),
                        transparent: false
                    })
                };

                return { materials, projectMaterials };
            } catch (error) {
                console.error('Error creating materials:', error);
                return null;
            }
        };

        // Create image planes
        const createImagePlane = (material, width, height, x, y, z) => {
            const geometry = new THREE.PlaneGeometry(width, height);
            const plane = new THREE.Mesh(geometry, material);
            plane.position.set(x, y, z);
            return plane;
        };

        // Initialize scene
        async function init() {
            const { materials, projectMaterials } = await createMaterials();
            if (!materials || !projectMaterials) return;

            // ===== CONFIGURABLE POSITIONS AND DIMENSIONS FOR IMAGES =====
            const imageConfig = {
                image1: { x: 0, y: 0, z: 0, width: 5, height: 5 },   // Top-left
                image2: { x: 0, y: 0, z: -10, width: 3.5, height: 4 },    // Top-right
                image3: { x: 4, y: 0, z: -12, width: 4.5, height: 2.5 }, // Bottom-left
                image4: { x: 4, y: 0, z: -13, width: 4.5, height: 4.5 } // Bottom-right
            };

            // Add image planes to scene
            const images = [
                { material: materials.image1, ...imageConfig.image1 },
                { material: materials.image2, ...imageConfig.image2 },
                { material: materials.image3, ...imageConfig.image3 },
                { material: materials.image4, ...imageConfig.image4 }
            ];

            images.forEach(img => {
                const plane = createImagePlane(img.material, img.width, img.height, img.x, img.y, img.z);
                scene.add(plane);
            });

            // ===== CONFIGURABLE POSITIONS AND DIMENSIONS FOR CONTAINERS =====
            const containerConfig = {
                project1: { x: -4, y: 2, z: -25, width: 2, height: 1.9 },      // Tri.html
                project2: { x: 4, y: 2, z: -30, width: 2, height: 3 },          // project2.html
                project3: { x: -4, y: -2, z: -35, width: 2.2, height: 1.6 },    // project5.html
                project4: { x: 0, y: 0, z: -40, width: 2, height: 2 },          // wedding.html
                project5: { x: 4, y: -2, z: -45, width: 2.8, height: 0.82 },    // https://photos.souravchakraborty.in
                project6: { x: -4, y: 0, z: -50, width: 1.7, height: 1.7 },     // Prewedding.html
                project7: { x: 4, y: 0, z: -55, width: 2.2, height: 2.2 },      // r.html
                project8: { x: 0, y: 2, z: -60, width: 2, height: 1.6 }         // project3.html
            };

            // Create project containers
            const containers = [];
            const containerPages = {
                project1: 'Tri.html',
                project2: 'project2.html',
                project3: 'project5.html',
                project4: 'wedding.html',
                project5: 'https://photos.souravchakraborty.in',
                project6: 'Prewedding.html',
                project7: 'r.html',
                project8: 'project3.html'
            };

            // Make materials transparent for hover effect
            Object.entries(projectMaterials).forEach(([key, material]) => {
                material.transparent = true;
                material.opacity = 1.0;
            });

            Object.entries(projectMaterials).forEach(([key, material]) => {
                const config = containerConfig[key];
                const container = createImagePlane(material, config.width, config.height, config.x, config.y, config.z);

                // Add click handler
                container.userData.page = containerPages[key];
                container.userData.isClickable = true;
                container.userData.requiresInvite = key === 'project5';

                containers.push(container);
                scene.add(container);
            });

            // Add click handling
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            window.addEventListener('click', (event) => {
                if (inviteModal.classList.contains('is-open') || Date.now() < ignoreSceneClicksUntil) {
                    return;
                }

                // Calculate mouse position in normalized device coordinates
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                // Update the picking ray with the camera and mouse position
                raycaster.setFromCamera(mouse, camera);

                // Calculate objects intersecting the picking ray
                const intersects = raycaster.intersectObjects(containers);

                if (intersects.length > 0) {
                    const clickedObject = intersects[0].object;
                    if (clickedObject.userData.isClickable && clickedObject.userData.page) {
                        if (clickedObject.userData.requiresInvite) {
                            openInviteModal(clickedObject.userData.page);
                            return;
                        }

                        window.location.href = clickedObject.userData.page;
                    }
                }
            });

            // Add hover effect
            window.addEventListener('mousemove', (event) => {
                if (inviteModal.classList.contains('is-open')) {
                    containers.forEach(container => {
                        container.material.opacity = 1.0;
                    });
                    document.body.style.cursor = 'default';
                    return;
                }

                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(containers);

                // Reset all containers
                containers.forEach(container => {
                    container.material.opacity = 1.0;
                });

                // Highlight hovered container
                if (intersects.length > 0) {
                    const hoveredObject = intersects[0].object;
                    if (hoveredObject.userData.isClickable) {
                        hoveredObject.material.opacity = 0.8;
                        document.body.style.cursor = 'pointer';
                    }
                } else {
                    document.body.style.cursor = 'default';
                }
            });

            // Set initial camera position to show first image properly
            camera.position.z = 8;
            targetZ = camera.position.z;

            // Update scroll limits
            const minZ = -70; // Adjusted for all objects (deepest Z is -65)
            const maxZ = 8;   // Starting position
        }

        // Mouse scroll handling
        let targetZ = 8; // Initial target Z position
        let targetCameraX = 0;
        let targetCameraY = 0;
        let mouseX = 0;
        let mouseY = 0;

        const scrollSpeed = 0.05; // Reduced for smoother scrolling
        const minZ = -70;
        const maxZ = 8;

        window.addEventListener('mousemove', (event) => {
            // For parallax effect
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('wheel', (event) => {
            targetZ += event.deltaY * scrollSpeed;
            targetZ = Math.max(minZ, Math.min(maxZ, targetZ));

            // Fade out the indicator when the user scrolls deeper into the scene
            const indicator = document.getElementById('scroll-indicator');
            if (indicator) {
                if (targetZ < maxZ - 2) {
                    indicator.style.opacity = '0';
                } else {
                    indicator.style.opacity = '1';
                }
            }
        });

        // Touch scroll handling for mobile
        let touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', e => {
            const touchY = e.touches[0].clientY;
            const deltaY = touchStartY - touchY;

            targetZ += deltaY * 0.08; // Touch sensitivity adjustment
            targetZ = Math.max(minZ, Math.min(maxZ, targetZ));

            touchStartY = touchY;

            const indicator = document.getElementById('scroll-indicator');
            if (indicator) {
                if (targetZ < maxZ - 2) {
                    indicator.style.opacity = '0';
                } else {
                    indicator.style.opacity = '1';
                }
            }
        }, { passive: true });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Smoother camera movement for depth (Z)
            camera.position.z += (targetZ - camera.position.z) * 0.05;

            // Mouse follow and parallax skew removed completely per user request.
            // camera.position.x and camera.position.y stay at default.
            // camera.rotation remains at default.

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start the scene
        init().then(() => {
            animate();
        });
    </script>
</body>

</html>
