<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weddings — Sourav Chakraborty</title>
    <meta name="description" content="Wedding films by Sourav Chakraborty — cinematic wedding videography">
    
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="film.css">
    
    <style>
        /* Hide inherited page title for Siena aesthetic */
        .page-title { display: none; }
        
        /* ─── Full-screen Scroll-Snap Container ─── */
        html { scroll-behavior: auto; }
        body { overflow: hidden; background: #000; margin: 0; padding: 0; }
        
        .video-scroller {
            width: 100vw;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            position: relative;
        }
        .video-scroller::-webkit-scrollbar { display: none; }

        .video-section {
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
        }

        /* ─── Background Video Cover (Siena Style) ─── */
        /* flawless 16:9 aspect ratio full-bleed cover trick */
        .video-wrapper {
            position: absolute;
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* Disables youtube click pausing */
            opacity: 0.5;
            transition: opacity 1.5s ease-in-out;
        }

        .video-section.active .video-wrapper {
            opacity: 0.7; /* Brightens when active */
        }

        .plyr {
            width: 100%;
            height: 100%;
            transform: scale(1.05); /* Slight zoom to hide Youtube edges */
        }
        .plyr__controls {
            display: none !important; /* Siena minimal style */
        }

        /* ─── Siena Editorial Overlay ─── */
        .siena-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            z-index: 10;
        }

        .siena-overlay__top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.8s 0.2s ease, transform 0.8s 0.2s ease;
        }
        
        .video-section.active .siena-overlay__top {
            opacity: 1;
            transform: translateY(0);
        }

        .siena-overlay__bottom {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .video-title {
            font-family: 'Inter', sans-serif;
            /* Massive Siena Typography */
            font-size: clamp(60px, 12vw, 150px);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: #fff;
            margin: 0;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .video-section.active .video-title {
            opacity: 1;
            transform: translateY(0);
        }

        /* Action Buttons */
        .siena-actions {
            pointer-events: auto;
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
            z-index: 9999;
            opacity: 0;
            animation: fadeIn 1s 1.5s ease forwards;
        }

        .siena-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .siena-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.8);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .siena-overlay { padding: 24px; }
            .video-title { font-size: clamp(40px, 15vw, 80px); }
            .siena-actions { bottom: 24px; right: 24px; gap: 10px; }
            .siena-btn { padding: 10px 16px; font-size: 9px; }
            .siena-overlay__top { font-size: 9px; letter-spacing: 2px; }
        }
    </style>
</head>
<body class="film-grain film-vignette">

    <div class="film-loader" id="loader">
        <div class="film-loader__ring"></div>
        <div class="film-loader__text">Loading</div>
    </div>

    <!-- Back Button -->
    <a href="index.html" class="back-btn" style="position: fixed; z-index: 9999; pointer-events: auto;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
    </a>

    <!-- Global Interface -->
    <div class="siena-actions">
        <button class="siena-btn" id="soundToggle">Sound: OFF</button>
    </div>

    <!-- Scroll Hint -->
    <div class="scroll-hint" id="scrollHint" style="position: fixed; bottom: 40px; pointer-events: none;">
        <span class="scroll-hint__text" style="color: #fff">Scroll</span>
        <div class="scroll-hint__mouse" style="border-color: rgba(255,255,255,0.5)">
            <div class="scroll-hint__wheel" style="background: #fff"></div>
        </div>
    </div>

    <div class="video-scroller" id="scroller"></div>

    <!-- Plyr JS -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const videos = [
            { id: "j6KxpiUJJ1Y", title: "Sukanya<br>Sayak" },
            { id: "Zy1IGA-aFNI", title: "Sayantani<br>Debarshi" },
            { id: "lZ8vpZghhG8", title: "Shivani<br>Pawan" },
            { id: "VjV4iJC-rBc", title: "Rhea<br>Craig" },
            { id: "lFbrmG26eos", title: "Upasana<br>Akash" }
        ];

        const scroller = document.getElementById('scroller');
        
        videos.forEach((video, i) => {
            const section = document.createElement('div');
            section.className = 'video-section';
            section.dataset.index = i;
            
            section.innerHTML = `
                <div class="video-wrapper">
                    <!-- Plyr Youtube integration -->
                    <div id="player-${i}" data-plyr-provider="youtube" data-plyr-embed-id="${video.id}"></div>
                </div>
                <div class="siena-overlay">
                    <div class="siena-overlay__top">
                        <div class="siena-meta">Sourav.film / Weddings</div>
                        <div class="siena-counter">FILM 0${i + 1} / 0${videos.length}</div>
                    </div>
                    <div class="siena-overlay__bottom">
                        <h1 class="video-title">${video.title}</h1>
                    </div>
                </div>
            `;
            scroller.appendChild(section);
        });

        let players = [];
        let isMuted = true;
        const soundToggle = document.getElementById('soundToggle');
        const scrollHint = document.getElementById('scrollHint');

        // Initialize Plyr Instances
        videos.forEach((video, i) => {
            players[i] = new Plyr(`#player-${i}`, {
                controls: [], // Hide all controls
                autoplay: false,
                muted: true, // Must start muted in modern browsers for autoplay
                clickToPlay: false,
                keyboard: { focused: false, global: false },
                youtube: { 
                    noCookie: false, 
                    rel: 0, 
                    showinfo: 0, 
                    iv_load_policy: 3, 
                    modestbranding: 1, 
                    playsinline: 1 
                }
            });
        });

        // Hide loader when first video is ready
        if (players.length > 0) {
            players[0].on('ready', () => {
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                }, 800);
            });
        }

        // Global Sound Logic
        soundToggle.addEventListener('click', () => {
            isMuted = !isMuted;
            soundToggle.textContent = isMuted ? "Sound: OFF" : "Sound: ON";
            
            players.forEach(player => {
                player.muted = isMuted;
            });
        });

        // Scroll Intersection Observer for Seamless Autoplay
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const idx = parseInt(entry.target.dataset.index);
                if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
                    entry.target.classList.add('active');
                    if (players[idx]) players[idx].play();
                    
                    if (idx > 0 && scrollHint) {
                        scrollHint.style.opacity = '0';
                    }
                    
                    // Pause other out-of-view videos
                    players.forEach((p, i) => {
                        if (i !== idx) p.pause();
                    });
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, {
            root: scroller,
            threshold: 0.5
        });

        document.querySelectorAll('.video-section').forEach(section => {
            observer.observe(section);
        });
        
        // Failsafe Loader removal
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
        }, 3000);
    </script>

</body>
</html>
