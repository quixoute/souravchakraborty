<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels — Sourav Chakraborty</title>
    <meta name="description" content="Short-form reels and brand films by Sourav Chakraborty">
    <link rel="stylesheet" href="film.css">
    <style>
        body { overflow-y: auto; overflow-x: hidden; }

        .hub-header {
            text-align: center;
            padding: 120px 20px 50px;
            opacity: 0;
            animation: fadeInUp 0.8s 0.3s var(--transition-smooth) forwards;
        }
        .hub-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(36px, 7vw, 64px);
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--film-text);
            margin-bottom: 12px;
        }
        .hub-header p {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--film-text-dim);
        }
        .hub-header .divider {
            width: 40px; height: 1px;
            background: var(--film-accent);
            margin: 24px auto 0;
        }

        /* ─── Project Card Grid ─── */
        .projects-grid {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 24px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }

        .project-card {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.6s var(--transition-smooth),
                        transform 0.6s var(--transition-smooth);
        }
        .project-card.visible { opacity: 1; transform: translateY(0); }

        .project-card__image {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--film-surface);
        }

        .project-card__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: saturate(0.7) contrast(1.05) brightness(0.95);
            transition: transform 0.7s var(--transition-smooth),
                        filter 0.7s var(--transition-smooth);
        }

        .project-card:hover .project-card__image img {
            transform: scale(1.06);
            filter: saturate(0.9) contrast(1.1) brightness(1);
        }

        /* Warm glow overlay on hover */
        .project-card__image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(196, 162, 101, 0.05) 0%,
                rgba(0, 0, 0, 0.3) 100%
            );
            opacity: 0;
            transition: opacity 0.5s var(--transition-smooth);
        }
        .project-card:hover .project-card__image::after { opacity: 1; }

        .project-card__info {
            padding: 16px 4px;
        }

        .project-card__title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--film-text);
            transition: color 0.3s;
        }
        .project-card:hover .project-card__title { color: var(--film-accent); }

        .project-card__subtitle {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--film-text-dim);
            margin-top: 4px;
        }

        /* Arrow indicator */
        .project-card__arrow {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translate(4px, -4px);
            transition: opacity 0.4s var(--transition-smooth),
                        transform 0.4s var(--transition-smooth);
        }
        .project-card:hover .project-card__arrow {
            opacity: 1;
            transform: translate(0, 0);
        }
        .project-card__arrow svg {
            width: 14px;
            height: 14px;
            stroke: var(--film-accent);
        }

        .hub-footer {
            text-align: center;
            padding: 20px 20px 60px;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--film-text-dim);
            text-transform: uppercase;
        }

        @media (max-width: 640px) {
            .projects-grid {
                grid-template-columns: 1fr;
                padding: 16px 16px 60px;
                gap: 24px;
            }
            .hub-header { padding: 100px 16px 40px; }
        }
    </style>
</head>
<body class="film-grain film-vignette">

    <div class="film-loader" id="loader"><div class="film-loader__ring"></div><div class="film-loader__text">Loading</div></div>

    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
        </svg>Back
    </a>

    <div class="hub-header">
        <h1>Reels</h1>
        <p>Short-form Films & Brand Content</p>
        <div class="divider"></div>
    </div>

    <div class="projects-grid" id="projectsGrid"></div>

    <div class="hub-footer">Sourav Chakraborty</div>

    <script>
        const projects = [
            { image: '45.jpg',  title: 'Mumuso',        subtitle: 'Brand Film',    page: 'mumuso.html' },
            { image: '47.jpg',  title: 'Spacify',       subtitle: 'Brand Reels',   page: 'spacify.html' },
            { image: '46.jpg',  title: 'Rimi Nayak',    subtitle: 'Brand Film',    page: 'riminayak.html' },
            { image: '41.jpg',  title: 'Wedding Reels', subtitle: 'Short Films',   page: 'weddingreels.html' },
            { image: '42.jpg',  title: 'Turtle',        subtitle: 'Brand Reels',   page: 'turtle.html' }
        ];

        const grid = document.getElementById('projectsGrid');

        projects.forEach((proj, i) => {
            const card = document.createElement('a');
            card.className = 'project-card';
            card.href = proj.page;
            card.innerHTML = `
                <div class="project-card__image">
                    <img src="${proj.image}" alt="${proj.title}" loading="lazy" decoding="async">
                </div>
                <div class="project-card__arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="7" y1="17" x2="17" y2="7"></line>
                        <polyline points="7 7 17 7 17 17"></polyline>
                    </svg>
                </div>
                <div class="project-card__info">
                    <div class="project-card__title">${proj.title}</div>
                    <div class="project-card__subtitle">${proj.subtitle}</div>
                </div>
            `;
            grid.appendChild(card);
        });

        // Reveal on scroll
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.project-card').forEach((card, i) => {
            card.style.transitionDelay = `${i * 0.1}s`;
            revealObserver.observe(card);
        });

        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
        });
    </script>
<script src="mouse-skew.js"></script></body>
</html>
