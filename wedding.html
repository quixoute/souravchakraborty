<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weddings — Sourav Chakraborty</title>
    <meta name="description" content="Wedding films by Sourav Chakraborty — cinematic wedding videography">
    <link rel="stylesheet" href="film.css">
    <style>
        /* ─── Full-screen Scroll-Snap Video Container ─── */
        html {
            scroll-behavior: auto; /* snap handles smoothness */
        }

        body {
            overflow: hidden;
        }

        .video-scroller {
            width: 100vw;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .video-scroller::-webkit-scrollbar {
            display: none;
        }

        /* ─── Each Video Section ─── */
        .video-section {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .video-section__bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--film-bg);
        }

        /* Separator line between sections */
        .video-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--film-border), transparent);
        }

        .video-section:last-child::after {
            display: none;
        }

        /* ─── Video Wrapper ─── */
        .video-wrapper {
            position: relative;
            width: 90%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(196, 162, 101, 0.08);
            opacity: 0;
            transform: scale(0.96);
            transition: opacity 0.8s var(--transition-smooth),
                        transform 0.8s var(--transition-smooth);
        }

        .video-section.active .video-wrapper {
            opacity: 1;
            transform: scale(1);
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ─── Video Title Overlay ─── */
        .video-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 30px 24px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.5s var(--transition-smooth);
            pointer-events: none;
        }

        .video-section.active .video-info {
            opacity: 1;
        }

        .video-info__title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(18px, 3vw, 28px);
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--film-text);
        }

        .video-info__number {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--film-accent);
            margin-bottom: 6px;
        }

        /* ─── Counter ─── */
        .video-counter {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: var(--film-text-dim);
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 0.6s 1.2s var(--transition-smooth) forwards;
        }

        .video-counter__current {
            color: var(--film-accent);
            font-size: 22px;
        }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .video-wrapper {
                width: 96%;
                border-radius: 2px;
            }

            .video-info {
                padding: 30px 16px 16px;
            }

            .video-counter {
                bottom: 20px;
                right: 16px;
                font-size: 12px;
            }

            .video-counter__current {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .video-wrapper {
                width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body class="film-grain film-vignette">

    <!-- Loading -->
    <div class="film-loader" id="loader">
        <div class="film-loader__ring"></div>
        <div class="film-loader__text">Loading</div>
    </div>

    <!-- Back Button -->
    <a href="index.html" class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
    </a>

    <!-- Page Title -->
    <div class="page-title">Weddings</div>

    <!-- Scroll Indicator -->
    <div class="scroll-hint" id="scrollHint">
        <span class="scroll-hint__text">Scroll</span>
        <div class="scroll-hint__mouse">
            <div class="scroll-hint__wheel"></div>
        </div>
    </div>

    <!-- Progress Dots -->
    <div class="video-progress" id="progressDots"></div>

    <!-- Video Counter -->
    <div class="video-counter">
        <span class="video-counter__current" id="currentIdx">01</span>
        <span> / </span>
        <span id="totalIdx">05</span>
    </div>

    <!-- Video Scroller -->
    <div class="video-scroller" id="scroller">
        <!-- Videos are injected by JS -->
    </div>

    <script>
        // ─── Video Data ───
        const videos = [
            { id: "j6KxpiUJJ1Y", title: "Sukanya × Sayak" },
            { id: "Zy1IGA-aFNI", title: "Sayantani × Debarshi" },
            { id: "lZ8vpZghhG8", title: "Shivani × Pawan" },
            { id: "VjV4iJC-rBc", title: "Rhea × Craig" },
            { id: "lFbrmG26eos", title: "Upasana × Akash" }
        ];

        const scroller = document.getElementById('scroller');
        const progressDots = document.getElementById('progressDots');
        const scrollHint = document.getElementById('scrollHint');
        const currentIdxEl = document.getElementById('currentIdx');
        const totalIdxEl = document.getElementById('totalIdx');

        totalIdxEl.textContent = String(videos.length).padStart(2, '0');

        // ─── Build Sections & Dots ───
        videos.forEach((video, i) => {
            // Section
            const section = document.createElement('div');
            section.className = 'video-section';
            section.dataset.index = i;
            section.innerHTML = `
                <div class="video-section__bg"></div>
                <div class="video-wrapper">
                    <div id="player-${i}"></div>
                    <div class="video-info">
                        <div class="video-info__number">Film ${String(i + 1).padStart(2, '0')}</div>
                        <div class="video-info__title">${video.title}</div>
                    </div>
                </div>
            `;
            scroller.appendChild(section);

            // Dot
            const dot = document.createElement('div');
            dot.className = 'video-progress__dot';
            dot.dataset.index = i;
            dot.addEventListener('click', () => {
                const target = scroller.children[i];
                target.scrollIntoView({ behavior: 'smooth' });
            });
            progressDots.appendChild(dot);
        });

        // ─── YouTube IFrame API ───
        let players = [];
        let apiReady = false;

        // Load YT API
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = function () {
            apiReady = true;
            videos.forEach((video, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: video.id,
                    playerVars: {
                        rel: 0,
                        modestbranding: 1,
                        playsinline: 1,
                        controls: 1
                    },
                    events: {
                        onReady: () => {
                            // Hide loader once first player is ready
                            if (i === 0) {
                                setTimeout(() => {
                                    document.getElementById('loader').classList.add('hidden');
                                }, 600);
                            }
                        }
                    }
                });
            });
        };

        // ─── Intersection Observer for Autoplay ───
        let activeIndex = 0;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const idx = parseInt(entry.target.dataset.index);

                if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
                    entry.target.classList.add('active');
                    activeIndex = idx;

                    // Update counter
                    currentIdxEl.textContent = String(idx + 1).padStart(2, '0');

                    // Update dots
                    document.querySelectorAll('.video-progress__dot').forEach((dot, di) => {
                        dot.classList.toggle('active', di === idx);
                    });

                    // Hide scroll hint after first scroll
                    if (idx > 0) {
                        scrollHint.style.opacity = '0';
                    }

                    // Autoplay current, pause others
                    if (apiReady) {
                        players.forEach((player, pi) => {
                            try {
                                if (pi === idx) {
                                    player.playVideo();
                                } else {
                                    player.pauseVideo();
                                }
                            } catch (e) { /* player not ready yet */ }
                        });
                    }
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, {
            root: scroller,
            threshold: [0.6]
        });

        // Observe all sections
        document.querySelectorAll('.video-section').forEach(section => {
            observer.observe(section);
        });

        // Activate first section
        setTimeout(() => {
            const first = document.querySelector('.video-section');
            if (first) first.classList.add('active');
            document.querySelector('.video-progress__dot')?.classList.add('active');
        }, 100);

        // Fallback loader hide
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 3000);
        });
    </script>
</body>
</html>
