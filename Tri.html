<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourav Chakraborty - Tri</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* Scroll indicator styles */
        #scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #000;
            font-family: 'Inter', 'Roboto', sans-serif;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .scroll-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .mouse {
            width: 24px;
            height: 38px;
            border: 2px solid rgba(0, 0, 0, 0.8);
            border-radius: 14px;
            margin: 0 auto;
            position: relative;
        }

        .wheel {
            width: 2px;
            height: 6px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 2px;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            animation: scrollUp 1.5s infinite;
        }

        @keyframes scrollUp {
            0% {
                top: 20px;
                opacity: 0;
            }

            20% {
                top: 20px;
                opacity: 1;
            }

            80% {
                top: 6px;
                opacity: 1;
            }

            100% {
                top: 6px;
                opacity: 0;
            }
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 40px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: rgba(255, 255, 255, 1);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .back-btn:hover svg {
            transform: translateX(-4px);
        }
    </style>
</head>

<body>
    <!-- Go Back Button -->
    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
    </a>

    <div id="scroll-indicator">
        <div class="scroll-text">Scroll up to explore</div>
        <div class="mouse">
            <div class="wheel"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        // Light grey background for the sub-gallery to differentiate slightly
        scene.background = new THREE.Color(0xf5f5f5);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(0, 1, 1);
        scene.add(directionalLight);

        // Texture loader
        const textureLoader = new THREE.TextureLoader();
        const loadTexture = (path) => {
            return new Promise((resolve, reject) => {
                textureLoader.load(
                    path,
                    (texture) => resolve(texture),
                    undefined,
                    (error) => {
                        console.error(`Error loading texture ${path}:`, error);
                        reject(error);
                    }
                );
            });
        };

        // Create image plane
        const createImagePlane = (material, width, height, x, y, z) => {
            const geometry = new THREE.PlaneGeometry(width, height);
            const plane = new THREE.Mesh(geometry, material);
            plane.position.set(x, y, z);
            return plane;
        };

        // Initialize scene
        async function init() {
            // Define the 14 images we found in the directory
            const imagePaths = Array.from({ length: 14 }, (_, i) => `Tri/${i + 1}.webp`);

            try {
                // Load all textures
                const textures = await Promise.all(imagePaths.map(path => loadTexture(path).catch(e => null)));

                // Track highest Z depth we place an image at to set scrolling bounds
                let maxDepth = 0;
                window.imagePlanes = [];

                textures.forEach((texture, index) => {
                    if (!texture) return; // Skip failed loads

                    // Approximate aspect ratio (most are vertical, some horizontal)
                    // We'll use a standard size and adjust slightly for variety
                    const aspectRatio = texture.image.width / texture.image.height;
                    const baseScale = 4.0;
                    
                    let width, height;
                    if (aspectRatio > 1) {
                        width = baseScale;
                        height = baseScale / aspectRatio;
                    } else {
                        height = baseScale;
                        width = baseScale * aspectRatio;
                    }

                    const material = new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true
                    });

                    // Distribute images along the Z axis (depth)
                    const z = -(index * 15); // Increased spread for dramatic pause
                    const x = (index % 2 === 0 ? 1 : -1) * (4 + Math.random() * 2); 
                    const y = (Math.random() * 4) - 2;

                    if (z < maxDepth) maxDepth = z;

                    const plane = createImagePlane(material, width, height, x, y, z);

                    // Add slight rotation for artistic effect
                    const rotZ = (Math.random() - 0.5) * 0.2;
                    plane.rotation.z = rotZ;
                    
                    // Store base transforms for dynamic centering
                    plane.userData = {
                        baseX: x,
                        baseY: y,
                        baseZ: z,
                        baseRotZ: rotZ
                    };

                    window.imagePlanes.push(plane);
                    scene.add(plane);
                });

                // Set initial camera
                camera.position.z = 20;
                targetZ = 20;

                // Update global minZ based on how many images we loaded
                window.minZ = maxDepth - 10;
                window.maxZ = 20;

            } catch (error) {
                console.error("Error setting up scene:", error);
            }
        }

        // Mouse scroll handling
        let targetZ = 20;
        const scrollSpeed = 0.03; // Slower scroll
        window.minZ = -100; // Updated dynamically in init()
        window.maxZ = 20;

        window.addEventListener('wheel', (event) => {
            targetZ += event.deltaY * scrollSpeed;
            targetZ = Math.max(window.minZ, Math.min(window.maxZ, targetZ));

            // Fade scroll indicator
            const indicator = document.getElementById('scroll-indicator');
            if (indicator) {
                if (targetZ < window.maxZ - 2) {
                    indicator.style.opacity = '0';
                } else {
                    indicator.style.opacity = '1';
                }
            }
        });

        // Touch scroll handling for mobile
        let touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', e => {
            const touchY = e.touches[0].clientY;
            const deltaY = touchStartY - touchY;

            targetZ += deltaY * 0.08; // Touch sensitivity adjustment
            targetZ = Math.max(window.minZ, Math.min(window.maxZ, targetZ));

            touchStartY = touchY;

            const indicator = document.getElementById('scroll-indicator');
            if (indicator) {
                if (targetZ < window.maxZ - 2) {
                    indicator.style.opacity = '0';
                } else {
                    indicator.style.opacity = '1';
                }
            }
        }, { passive: true });

        // Mouse tracking for parallax effect
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Smoother camera movement along Z axis
            camera.position.z += (targetZ - camera.position.z) * 0.03; // Slower Camera Lerp

            // Optional: add slight parallax/sway based on mouse position
            let parallaxX = 0;
            let parallaxY = 0;
            if (mouse.x !== undefined) {
                parallaxX = mouse.x * 0.5;
                parallaxY = mouse.y * 0.5;
                
                camera.position.x += (parallaxX - camera.position.x) * 0.02;
                camera.position.y += (parallaxY - camera.position.y) * 0.02;
            }

            // Dynamic centering logic (Focus-on-approach)
            if (window.imagePlanes) {
                // > 14: Too far/Background (factor 0)
                // 14 to 8: Approaching (slides in gently)
                // 8 to 2: The Plateau (factor 1, stays perfectly still!)
                // 2 to -2: Passing (slides out fast behind)
                
                window.imagePlanes.forEach(plane => {
                    const dist = camera.position.z - plane.userData.baseZ;
                    
                    let factor = 0;
                    if (dist > 14) {
                        factor = 0; // Far away
                    } else if (dist <= 14 && dist > 8) {
                        factor = 1.0 - ((dist - 8) / 6); // Slide in (0 to 1)
                    } else if (dist <= 8 && dist >= 2) {
                        factor = 1.0; // The Plateau (Hold still)
                    } else if (dist < 2 && dist > -2) {
                        factor = (dist + 2) / 4; // Passing fast (1 to 0)
                    } else {
                        factor = 0; // Behind camera
                    }
                    
                    // Ease the factor
                    const smoothFactor = factor * factor * (3 - 2 * factor); // smoothstep
                    
                    // Interpolate towards center
                    plane.position.x = THREE.MathUtils.lerp(plane.userData.baseX, parallaxX, smoothFactor);
                    plane.position.y = THREE.MathUtils.lerp(plane.userData.baseY, parallaxY, smoothFactor);
                    plane.rotation.z = THREE.MathUtils.lerp(plane.userData.baseRotZ, 0, smoothFactor);
                    
                    // Reset Y rotation 
                    if (plane.userData.baseRotY !== undefined) {
                        plane.rotation.y = THREE.MathUtils.lerp(plane.userData.baseRotY, 0, smoothFactor);
                    } else {
                        plane.rotation.y = THREE.MathUtils.lerp(plane.rotation.y, 0, 0.1); 
                    }
                });
            }

            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init().then(() => animate());
    </script>
</body>

</html>
