<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect — Sourav Chakraborty</title>
    <link rel="stylesheet" href="film.css">
    <style>
        body { overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .connect-window {
            width: 90%; max-width: 420px;
            background: var(--film-surface);
            border: 1px solid var(--film-border);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            opacity: 0;
            animation: fadeInScale 0.6s 0.3s var(--transition-smooth) forwards;
        }

        .connect-titlebar {
            background: var(--film-bg-light);
            padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--film-border);
        }
        .connect-titlebar span { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--film-text-dim); }

        .connect-body { padding: 28px 24px; }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-size: 10px; letter-spacing: 2px;
            text-transform: uppercase; color: var(--film-text-dim); margin-bottom: 8px;
        }
        .form-group input {
            width: 100%; padding: 10px 14px; background: var(--film-bg);
            border: 1px solid var(--film-border); border-radius: 4px;
            color: var(--film-text); font-family: 'Inter', sans-serif; font-size: 13px;
            transition: border-color 0.3s; box-sizing: border-box;
        }
        .form-group input:focus { outline: none; border-color: var(--film-accent-dim); }

        .connect-btn {
            width: 100%; padding: 12px; background: transparent;
            border: 1px solid var(--film-accent-dim); border-radius: 4px;
            color: var(--film-accent); font-family: 'Inter', sans-serif;
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s var(--transition-smooth);
        }
        .connect-btn:hover { background: rgba(196,162,101,0.1); border-color: var(--film-accent); }

        .status-msg { text-align: center; margin-top: 14px; font-size: 11px; min-height: 16px; }

        .file-list { margin-top: 16px; border-top: 1px solid var(--film-border); padding-top: 12px; }
        .file-list-item {
            padding: 8px 10px; border-radius: 4px; font-size: 12px;
            color: var(--film-text-dim); transition: background 0.2s; cursor: pointer;
        }
        .file-list-item:hover { background: rgba(196,162,101,0.08); color: var(--film-text); }
    </style>
</head>
<body class="film-grain film-vignette">
    <a href="index.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>Back</a>

    <div class="connect-window">
        <div class="connect-titlebar"><span>File Explorer</span></div>
        <div class="connect-body">
            <form id="ftpForm" onsubmit="return connectFTP(event)">
                <div class="form-group"><label for="username">Username</label><input type="text" id="username" required></div>
                <div class="form-group"><label for="password">Password</label><input type="password" id="password" required></div>
                <button type="submit" class="connect-btn">Connect</button>
                <div id="statusMessage" class="status-msg"></div>
            </form>
            <div id="fileList" class="file-list"></div>
        </div>
    </div>

    <script>
        function connectFTP(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const statusMessage = document.getElementById('statusMessage');
            const fileList = document.getElementById('fileList');

            fetch('/api/list-files', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    statusMessage.textContent = data.error;
                    statusMessage.style.color = '#8b4545';
                } else {
                    statusMessage.textContent = 'Connected';
                    statusMessage.style.color = '#c4a265';
                    fileList.innerHTML = '';
                    data.files.forEach(file => {
                        const item = document.createElement('div');
                        item.className = 'file-list-item';
                        item.innerHTML = `<a href="/api/download?filename=${file}" style="color:inherit;text-decoration:none;">📄 ${file}</a>`;
                        fileList.appendChild(item);
                    });
                }
            })
            .catch(() => {
                statusMessage.textContent = 'Connection failed';
                statusMessage.style.color = '#8b4545';
            });
            return false;
        }
    </script>
</body>
</html>
